<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>MND  · music player</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
<div class="app-container" role="main">
  <div class="app-header">
    <h1>◈ MND </h1>
    <div class="header-actions">
      <a href="library.html?tab=favorites"><i class="fas fa-heart"></i></a>
    </div>
  </div>

  <div class="content-scroll">
    <div class="search-box" id="homeSearchBox">
      <i class="fas fa-search"></i>
      <input type="text" placeholder="Search songs, artists, albums..." readonly>
    </div>

    <div class="section-title">Recently Played</div>
    <div class="hscroll" id="recentRow"></div>

    <div class="section-title">Albums<span class="link" onclick="window.location.href='albums.html'">See All</span></div>
    <div class="hscroll" id="albumRow"></div>

    <div class="section-title">Artists<span class="link" onclick="window.location.href='artists.html'">See All</span></div>
    <div class="hscroll" id="artistRow"></div>

    <div class="section-title">All Songs</div>
    <div class="track-list" id="allSongsList"></div>
  </div>

  <div id="miniPlayerRoot"></div>

  <div class="bottom-nav">
    <a href="index.html" class="nav-item" data-page="index.html"><i class="fas fa-home"></i><span>Home</span></a>
    <a href="search.html" class="nav-item" data-page="search.html"><i class="fas fa-search"></i><span>Search</span></a>
    <a href="library.html" class="nav-item" data-page="library.html"><i class="fa fa-music" aria-hidden="true"></i><span>Library</span></a>
    <a href="player.html" class="nav-item" data-page="player.html"><i class="fas fa-compact-disc"></i><span>Now Playing</span></a>
  </div>
</div>

<script src="js/storage.js"></script>
<script src="js/player.js"></script>
<script src="js/app.js"></script>
</body>
</html>
