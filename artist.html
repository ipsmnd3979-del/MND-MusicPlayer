<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Artist · noir </title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/player.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
<div class="app-container" role="main" id="artistRoot">
  <div class="app-header">
    <span class="back-btn" onclick="history.back()"><i class="fas fa-arrow-left"></i></span>
    <h1 style="font-size:0.95rem;">Artist</h1>
    <div class="header-actions"><i class="fas fa-ellipsis-h"></i></div>
  </div>

  <div class="content-scroll">
    <div style="text-align:center;">
      <div class="np-art-container" style="max-width:150px;border-radius:50%;margin:0 auto;">
        <img id="artistImage" src="" alt="artist">
      </div>
      <h2 id="artistName" style="font-size:1.3rem;font-weight:700;margin-top:14px;"></h2>
      <p id="artistGenres" class="text-muted" style="font-size:0.8rem;margin-top:2px;"></p>
      <p id="artistBio" class="text-muted" style="font-size:0.82rem;margin-top:10px;padding:0 6px;"></p>
      <div style="display:flex;justify-content:center;margin-top:16px;">
        <button class="btn btn-primary" id="playArtistBtn"><i class="fas fa-play"></i> Play All</button>
      </div>
    </div>

    <div class="section-title">Albums</div>
    <div class="hscroll" id="artistAlbumRow"></div>

    <div class="section-title">Songs</div>
    <div class="track-list" id="artistSongList"></div>
  </div>

  <div id="miniPlayerRoot"></div>

  <div class="bottom-nav">
    <a href="index.html" class="nav-item" data-page="index.html"><i class="fas fa-home"></i><span>Home</span></a>
    <a href="search.html" class="nav-item" data-page="search.html"><i class="fas fa-search"></i><span>Search</span></a>
    <a href="library.html" class="nav-item" data-page="library.html"><i class="fas fa-music"></i><span>Library</span></a>
    <a href="player.html" class="nav-item" data-page="player.html"><i class="fas fa-compact-disc"></i><span>Now Playing</span></a>
  </div>
</div>

<script src="js/storage.js"></script>
<script src="js/player.js"></script>
<script src="js/artist.js"></script>
</body>
</html>
